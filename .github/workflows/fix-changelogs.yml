name: Fix Changelogs

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-changelogs:
    name: Fix changelogs
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@metamaskbot check-deps')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR head ref
        id: pr
        run: |
          PR_DATA=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '{ref: .head.ref, sha: .head.sha}')
          echo "ref=$(echo "$PR_DATA" | jq -r .ref)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR_DATA" | jq -r .sha)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}

      - name: React to comment
        run: gh api "repos/${GITHUB_REPOSITORY}/issues/comments/${COMMENT_ID}/reactions" -f content='+1'
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_ID: ${{ github.event.comment.id }}

      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v2
        with:
          is-high-risk-environment: false
          cache-node-modules: true
          node-version: 22.x
          ref: ${{ steps.pr.outputs.sha }}

      - name: Checkout branch by name
        run: git checkout "$PR_REF"
        env:
          PR_REF: ${{ steps.pr.outputs.ref }}

      - name: Run changelog update
        run: yarn changelog:update

      - name: Fix missing dependency bump entries
        run: >
          yarn workspaces foreach --all --no-private --parallel --interlaced --verbose
          run changelog:validate --fix --currentPr "$PR_NUMBER"
        continue-on-error: true
        env:
          PR_NUMBER: ${{ github.event.issue.number }}

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --stat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A '*.md'
          git commit -m "fix: auto-update changelogs for release"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment result
        run: |
          if [ "$CHANGED" = "true" ]; then
            gh pr comment "$PR_NUMBER" --body "Changelogs updated and pushed."
          else
            gh pr comment "$PR_NUMBER" --body "No changelog changes needed."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.issue.number }}
          CHANGED: ${{ steps.commit.outputs.changed }}
