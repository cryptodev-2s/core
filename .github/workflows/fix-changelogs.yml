name: Fix Changelogs

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  fix-changelogs:
    name: Fix changelogs
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@metamaskbot check-deps')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR head ref
        id: pr
        run: |
          PR_DATA=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }} --jq '{ref: .head.ref, sha: .head.sha}')
          echo "ref=$(echo "$PR_DATA" | jq -r .ref)" >> "$GITHUB_OUTPUT"
          echo "sha=$(echo "$PR_DATA" | jq -r .sha)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: React to comment
        run: gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions -f content='+1'
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout and setup environment
        uses: MetaMask/action-checkout-and-setup@v2
        with:
          is-high-risk-environment: false
          cache-node-modules: true
          node-version: 22.x
          ref: ${{ steps.pr.outputs.ref }}

      - name: Checkout branch by name
        run: git checkout "${{ steps.pr.outputs.ref }}"

      - name: Run changelog update
        run: yarn changelog:update

      - name: Fix missing dependency bump entries
        run: >
          yarn workspaces foreach --all --no-private --parallel --interlaced --verbose
          run changelog:validate --fix --currentPr "${{ github.event.issue.number }}"
        continue-on-error: true

      - name: Commit and push if changed
        id: commit
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --stat
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A '*.md'
          git commit -m "fix: auto-update changelogs for release"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Comment result
        run: |
          if [ "${{ steps.commit.outputs.changed }}" = "true" ]; then
            gh pr comment "${{ github.event.issue.number }}" --body "Changelogs updated and pushed."
          else
            gh pr comment "${{ github.event.issue.number }}" --body "No changelog changes needed."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
